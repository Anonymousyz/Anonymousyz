<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Anonymousyz applied AI deployment portfolio</title>
  <desc id="desc">Three connected open-source repositories covering tool discovery, workflow readiness and accountable decision packets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#17152e"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#34d399"/><stop offset=".5" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="1" opacity=".5"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/><rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="58" y="44" width="1084" height="542" rx="26" fill="#0f172a" stroke="#24324a"/>
  <text x="92" y="92" fill="#67e8f9" font-family="Segoe UI,Arial" font-size="15" font-weight="700" letter-spacing="2">APPLIED AI DEPLOYMENT + GOVERNANCE</text>
  <text x="92" y="146" fill="#f8fafc" font-family="Segoe UI,Arial" font-size="42" font-weight="750">Three repositories. One accountable workflow.</text>
  <text x="92" y="182" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="20">Discover the tools, test the workflow, then prepare the human decision.</text>
  <path d="M377 337H420M780 337H823" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)" font-family="Segoe UI,Arial">
    <rect x="90" y="240" width="287" height="200" rx="19" fill="#0c2b27" stroke="#34d399" stroke-width="2"/>
    <text x="118" y="282" fill="#6ee7b7" font-size="14" font-weight="700">01 · DISCOVER</text><text x="118" y="326" fill="#f8fafc" font-size="25" font-weight="700">Awesome AI</text><text x="118" y="357" fill="#f8fafc" font-size="25" font-weight="700">Production Readiness</text><text x="118" y="397" fill="#94a3b8" font-size="15">57 verified tools and standards</text>
    <rect x="397" y="240" width="383" height="200" rx="19" fill="#0b2635" stroke="#22d3ee" stroke-width="2"/>
    <text x="425" y="282" fill="#67e8f9" font-size="14" font-weight="700">02 · TEST THE WORKFLOW</text><text x="425" y="326" fill="#f8fafc" font-size="25" font-weight="700">AI Prototype-to-Production</text><text x="425" y="357" fill="#f8fafc" font-size="25" font-weight="700">Toolkit</text><text x="425" y="397" fill="#94a3b8" font-size="15">70 points · 8 vetoes · real reports</text>
    <rect x="800" y="240" width="310" height="200" rx="19" fill="#211a3b" stroke="#a78bfa" stroke-width="2"/>
    <text x="828" y="282" fill="#ddd6fe" font-size="14" font-weight="700">03 · DECIDE</text><text x="828" y="326" fill="#f8fafc" font-size="25" font-weight="700">Research-to-Decision</text><text x="828" y="357" fill="#f8fafc" font-size="25" font-weight="700">Toolkit</text><text x="828" y="397" fill="#94a3b8" font-size="15">Evidence → judgment → decision</text>
  </g>
  <rect x="90" y="476" width="1020" height="61" rx="13" fill="#111c2e" stroke="#26364e"/>
  <text x="600" y="514" text-anchor="middle" fill="#cbd5e1" font-family="Segoe UI,Arial" font-size="16">Local CLIs · fixed schemas · synthetic cases · human decision boundaries · reproducible releases</text>
  <rect x="90" y="558" width="1020" height="4" rx="2" fill="url(#accent)"/>
</svg>
